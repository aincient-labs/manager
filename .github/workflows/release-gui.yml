# Builds the Tauri desktop GUI (`atelier-manager`) into OS-native installers and
# attaches them to the SAME GitHub Release that cargo-dist (`release.yml`) creates
# for the CLI. The GUI needs Tauri's own bundler to produce .dmg/.msi/.AppImage,
# which cargo-dist doesn't do — so it stays a separate workflow file, but it now
# rides the SAME tag so CLI + GUI ship as one versioned release, never out of sync.
#
# Trigger: the same `v*` tag as the CLI lane. One `git tag vX.Y.Z && git push
# --tags` fans out to both workflows; cargo-dist owns creating the Release, and
# this lane uploads the GUI bundles onto it. (The old `gui-v*` tag scheme is
# retired — it split one version across two releases and also false-triggered
# cargo-dist's plan step.)
#
# SIGNING (macOS): the mac bundle is signed with a Developer ID Application cert
# and notarized via the App Store Connect API — IFF the Apple secrets are present.
# tauri-action imports APPLE_CERTIFICATE into a throwaway keychain, Tauri's bundler
# signs with APPLE_SIGNING_IDENTITY (hardened runtime on) and notarizes with the
# APPLE_API_* key. When those secrets are ABSENT the build silently falls back to
# unsigned (Gatekeeper warns on first launch), so this workflow is safe to run
# before the secrets are configured. Windows Authenticode is still a fast-follow.
# Required secrets + the Apple-side setup are documented in the manager README.
name: Release GUI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (Apple Silicon + Intel in one .dmg)
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
            rust-targets: ''
          - platform: windows-latest
            target: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      # Linux system deps for Tauri v2 (webkit2gtk 4.1 + tray/app-indicator).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libgtk-3-dev \
            libssl-dev

      # Materialize the App Store Connect API key (.p8) that notarization needs as
      # a file on disk, and point APPLE_API_KEY_PATH at it. The key is stored as a
      # base64 secret because .p8 is multi-line PEM. macOS only; no-op (and the
      # whole build stays unsigned) when the secret is empty.
      - name: Prepare notarization API key (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          if [ -z "$APPLE_API_KEY_BASE64" ]; then
            echo "APPLE_API_KEY_BASE64 unset — skipping notarization key (build stays unsigned)"
            exit 0
          fi
          keydir="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$keydir"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$keydir/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$keydir/AuthKey.p8" >> "$GITHUB_ENV"

      # Build the native bundles ONLY — no `tagName`/`releaseName`, so tauri-action
      # does not create or upload a Release. It exposes the built bundle paths as
      # the `artifactPaths` output, which the next step attaches to the shared
      # release. Version comes from tauri.conf.json (kept in lockstep with the
      # workspace Cargo.toml version).
      - name: Build GUI bundles
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          # macOS Developer ID signing — empty on Linux/Windows and when the
          # secrets are unset, in which case tauri-action skips signing entirely.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Optional: password for the temp keychain tauri-action creates. If unset
          # the action generates a random one — fine to leave empty.
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Notarization via App Store Connect API key. APPLE_API_KEY is the Key ID,
          # APPLE_API_ISSUER the Issuer UUID; APPLE_API_KEY_PATH is exported into
          # GITHUB_ENV by the prepare step above.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          # The Tauri app crate lives in app/ (holds tauri.conf.json + src).
          projectPath: app
          # `--target ''` is invalid, so only pass the flag on macOS.
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      # cargo-dist (release.yml) owns creating the GitHub Release for this tag.
      # Wait for it to appear, then upload the GUI bundles onto it so CLI + GUI
      # live on ONE release. `--clobber` keeps re-runs idempotent. Runs under bash
      # on every OS (Git Bash on Windows) so seq/sleep/jq behave.
      - name: Attach bundles to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          for i in $(seq 1 40); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "release $TAG found — uploading GUI bundles"
              break
            fi
            echo "waiting for cargo-dist to create release $TAG… ($i/40)"
            sleep 30
          done
          mapfile -t files < <(printf '%s' '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]')
          if [ ${#files[@]} -eq 0 ]; then
            echo "no bundles were produced" >&2
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
