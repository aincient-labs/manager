[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Publish a Homebrew formula to this tap on each release
tap = "aincient-labs/homebrew-tap"
# Enable the Homebrew publish job (pushes the formula to the tap)
publish-jobs = ["homebrew"]
# Also run publish jobs (Homebrew) for prerelease tags (e.g. -rc.N) — off by
# default in dist, which is why rc tags otherwise skip the tap push.
publish-prereleases = true
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Build only the dist-enabled packages (the `atelier` CLI), not the whole
# workspace — otherwise `cargo build --workspace` compiles the Tauri GUI app
# (`aincient-manager`, dist=false), whose GTK/gdk-sys deps fail on Linux runners.
precise-builds = true
# We hand-edit the generated CI (release.yml) to set the Homebrew-tap commit
# author to our own persona (Starla Knight, the aincient-labs bot identity)
# instead of dist's hardcoded "axo bot" <admin+bot@axo.dev>. `allow-dirty=["ci"]`
# tells dist NOT to overwrite/consistency-check release.yml, so that edit
# survives `dist generate`. Trade-off: dist upgrades won't auto-rewrite CI —
# to pick up upstream CI changes, temporarily drop this, regenerate, re-apply
# the author edit (release.yml GITHUB_USER/GITHUB_EMAIL), then restore this line.
allow-dirty = ["ci"]
